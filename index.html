<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивное Расписание</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">📅 Мое Расписание</div>
            <div class="header-controls">
                <div class="version-tabs">
                    <button id="activeTab" class="tab-btn active">Текущее</button>
                    <button id="draftTab" class="tab-btn">Черновик</button>
                </div>
                <div class="mode-toggle">
                    <label class="switch">
                        <input type="checkbox" id="modeToggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span id="modeLabel">Редактирование</span>
                </div>
                <div class="header-actions">
                    <button id="manageTeachersBtn" class="primary-btn">Учителя</button>
                    <button id="logSleepBtn" class="secondary-btn">Сон</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="scheduleGrid" class="schedule-grid">
                <!-- Сетка расписания будет генерироваться через JS -->
            </div>
            
            <section class="analytics-section">
                <div class="analytics-header">
                    <h2>Аналитика времени</h2>
                    <div class="global-stats">
                        <div class="stat-card main">
                            <span class="stat-label">Всего учебы</span>
                            <span id="studyTimeText" class="stat-value">0 ч</span>
                        </div>
                        <div class="stat-card main">
                            <span class="stat-label">Свободное время</span>
                            <span id="restTimeText" class="stat-value">0 ч</span>
                        </div>
                    </div>
                </div>
                <div id="subjectBreakdownArea" class="subject-breakdown">
                    <!-- Карточки предметов появятся здесь -->
                </div>
            </section>
        </main>
    </div>

    <!-- Модальное окно редактирования занятия -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modalTitle">Занятие</h2>
            <form id="scheduleForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="subjectInput">Предмет:</label>
                    <input type="text" id="subjectInput" required>
                </div>
                <div class="form-group">
                    <label for="phoneInput">Телефон / Учитель:</label>
                    <input type="text" id="phoneInput">
                </div>
                <div class="form-group">
                    <label for="durationInput">Длительность (мин):</label>
                    <input type="number" id="durationInput" value="60">
                </div>
                <div class="form-group">
                    <label for="colorInput">Цвет блока:</label>
                    <input type="color" id="colorInput" value="#0984e3">
                </div>
                <div class="modal-actions">
                    <button type="button" id="closeModalBtn" class="secondary-btn">Отмена</button>
                    <button type="submit" class="primary-btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно управления учителями -->
    <div id="teachersModal" class="modal-overlay">
        <div class="modal-content wide">
            <h2>Настройка учителей</h2>
            <div id="teachersList" class="teachers-list"></div>
            <div class="modal-actions">
                <button type="button" id="closeTeachersBtn" class="secondary-btn">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования учителя -->
    <div id="teacherEditModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Реквизиты учителя</h2>
            <form id="teacherForm">
                <input type="hidden" id="editTeacherPhone">
                <div class="form-group">
                    <label for="teacherBank">Банк:</label>
                    <input type="text" id="teacherBank" placeholder="Например, Тинькофф">
                </div>
                <div class="form-group">
                    <label for="teacherCard">Номер карты:</label>
                    <input type="text" id="teacherCard" placeholder="0000 0000 0000 0000">
                </div>
                <div class="form-group">
                    <label for="teacherStatus">Статус:</label>
                    <select id="teacherStatus">
                        <option value="active">Активен</option>
                        <option value="inactive">Неактивен</option>
                        <option value="temporary">Временно недоступен</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelTeacherEdit" class="secondary-btn">Отмена</button>
                    <button type="submit" class="primary-btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
